<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>traffic survivor pro - Collision Fixed</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #2c3e50; margin: 0 auto; }
        .ui-top { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 15px; background: rgba(0,0,0,0.85); color: #f1c40f; font-size: 20px; z-index: 10; box-sizing: border-box; border-bottom: 3px solid #f1c40f; }
        .overlay-menu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; color: white; text-align: center; }
        .m-btn { padding: 15px 50px; margin: 12px; background: #27ae60; border: none; border-radius: 40px; color: white; font-size: 20px; font-weight: bold; width: 260px; cursor: pointer; box-shadow: 0 5px #1e8449; }
        .settings-box { background: #333; padding: 25px; border-radius: 20px; border: 2px solid #f1c40f; width: 320px; }
        select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; font-size: 16px; font-weight: bold; }
        #controls { position: fixed; bottom: 30px; right: 30px; display: grid; grid-template-columns: repeat(3, 85px); gap: 15px; z-index: 50; }
        .btn-c { width: 85px; height: 85px; background: rgba(255,255,255,0.15); border: 3px solid #f1c40f; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-size: 35px; user-select: none; }
    </style>
</head>
<body>
    <div class="ui-top">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="best">0</span></div>
        <div onclick="pauseGame()" style="cursor:pointer;">⏸ PAUSE</div>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="mainMenu" class="overlay-menu">
        <h1 style="font-size: 45px; color: #f1c40f;">traffic servivor pro</h1>
        <button class="m-btn" onclick="startNow()">START GAME</button>
        <button class="m-btn" style="background:#2980b9;" onclick="openSettings()">SETTINGS</button>
    </div>

    <div id="settingsMenu" class="overlay-menu" style="display:none;">
        <div class="settings-box">
            <h2 style="color:#f1c40f;">SETTINGS</h2>
            <label>LEVEL:</label>
            <select id="diffSelect">
                <option value="2">EASY</option>
                <option value="3.5" selected>NORMAL</option>
                <option value="6">HARDCORE</option>
            </select>
            <label>LANES:</label>
            <select id="laneSelect">
                <option value="6" selected>6 LANES</option>
                <option value="8">8 LANES</option>
            </select>
            <button class="m-btn" style="width:100%;" onclick="closeSettings()">SAVE</button>
        </div>
    </div>

    <div id="gameOverScreen" class="overlay-menu" style="display:none;">
        <h1 style="font-size: 55px; color: #e74c3c;">CRASHED!</h1>
        <h2 style="font-size: 30px;">SCORE: <span id="finalScore">0</span></h2>
        <h2 style="font-size: 28px; color:#f1c40f;">BEST: <span id="finalBest">0</span></h2>
        <button class="m-btn" onclick="location.reload()">RETRY</button>
    </div>

    <div id="controls">
        <div class="btn-c" id="upBtn" style="grid-column: 2;">🔼</div>
        <div class="btn-c" id="leftBtn" style="grid-column: 1; grid-row: 2;">◀️</div>
        <div class="btn-c" id="downBtn" style="grid-column: 2; grid-row: 2;">🔽</div>
        <div class="btn-c" id="rightBtn" style="grid-column: 3; grid-row: 2;">▶️</div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const bgMusic = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3');
    bgMusic.loop = true;

    let score = 0, gameActive = false, speed = 3, lanes = 6, difficulty = 3.5;
    let bestScore = localStorage.getItem("baqarBestScore") || 0;
    document.getElementById("best").innerText = bestScore;

    let roadOffset = 0, lastSpawn = 0, traffic = [];
    const carW = 180, carH = 180; // Optimized Size

    const carNames = ['ferrari', 'alto', 'mazda', 'f1', 'bike', 'truck', 'alto_gray'];
    const images = {};
    carNames.forEach(n => { images[n] = new Image(); images[n].src = n + ".png"; });

    let player = { x: 0, y: 0, tx: 0, ty: 0 };
    let keys = {};

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        player.tx = canvas.width / 2;
        player.ty = canvas.height - 150;
        player.x = player.tx; player.y = player.ty;
    }
    window.addEventListener('resize', init);
    init();

    function startNow() { document.getElementById("mainMenu").style.display = 'none'; gameActive = true; bgMusic.play().catch(()=>{}); requestAnimationFrame(gameLoop); }
    function pauseGame() { gameActive = false; document.getElementById("mainMenu").style.display = 'flex'; bgMusic.pause(); }
    function openSettings() { document.getElementById("settingsMenu").style.display = 'flex'; }
    function closeSettings() {
        lanes = parseInt(document.getElementById("laneSelect").value);
        difficulty = parseFloat(document.getElementById("diffSelect").value);
        document.getElementById("settingsMenu").style.display = 'none';
        init();
    }

    function gameLoop(ts) {
        if(!gameActive) return;

        ctx.fillStyle = "#2c3e50"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        let lw = canvas.width / lanes;
        ctx.strokeStyle = "rgba(255,255,255,0.4)"; ctx.setLineDash([45, 45]); ctx.lineDashOffset = -roadOffset;
        for(let i=1; i<lanes; i++) { ctx.beginPath(); ctx.moveTo(i * lw, 0); ctx.lineTo(i * lw, canvas.height); ctx.stroke(); }

        // SMOOTH MOVEMENT
        const drift = 18;
        if(keys['left']) player.tx -= drift;
        if(keys['right']) player.tx += drift;
        if(keys['up']) player.ty -= drift;
        if(keys['down']) player.ty += drift;

        player.tx = Math.max(carW/2, Math.min(canvas.width - carW/2, player.tx));
        player.ty = Math.max(carH/2, Math.min(canvas.height - carH/2, player.ty));

        player.x += (player.tx - player.x) * 0.25;
        player.y += (player.ty - player.y) * 0.25;
        roadOffset = (roadOffset + speed) % 90;

        // Draw Player (Centered Drawing)
        if(images.ferrari.complete) {
            ctx.drawImage(images.ferrari, player.x - carW/2, player.y - carH/2, carW, carH);
        }

        // TRAFFIC SPAWN
        if (ts - lastSpawn > (1500 / (difficulty/2))) { 
            let l = Math.floor(Math.random() * lanes);
            traffic.push({ x: (l * lw) + (lw/2), y: -300, img: carNames[Math.floor(Math.random()*6)+1] });
            lastSpawn = ts;
        }

        traffic.forEach((en, i) => {
            en.y += (speed + (score/500));
            if(images[en.img].complete) {
                ctx.drawImage(images[en.img], en.x - carW/2, en.y - carH/2, carW, carH);
            }
            
            if(en.y > canvas.height + 300) { traffic.splice(i, 1); score += 10; document.getElementById("score").innerText = score; }

            // FIXED CENTERED COLLISION LOGIC
            // Ab touching box bilkul car ki visual position ke saath sync hai
            let hitW = carW * 0.4; // Collison width (only the car body)
            let hitH = carH * 0.6; // Collision height
            
            if (Math.abs(player.x - en.x) < hitW && Math.abs(player.y - en.y) < hitH) {
                gameActive = false;
                if(score > bestScore) { localStorage.setItem("baqarBestScore", score); bestScore = score; }
                document.getElementById("finalScore").innerText = score;
                document.getElementById("finalBest").innerText = bestScore;
                document.getElementById("gameOverScreen").style.display = "flex";
                bgMusic.pause();
            }
        });
        requestAnimationFrame(gameLoop);
    }

    const bind = (id, k) => {
        const b = document.getElementById(id);
        b.addEventListener('touchstart', (e) => { e.preventDefault(); keys[k] = true; });
        b.addEventListener('touchend', (e) => { e.preventDefault(); keys[k] = false; });
        b.onmousedown = () => keys[k] = true; b.onmouseup = () => keys[k] = false;
    };
    bind("leftBtn", "left"); bind("rightBtn", "right"); bind("upBtn", "up"); bind("downBtn", "down");
    
    window.onkeydown = (e) => {
        if(e.key.includes("Left")) keys['left'] = true;
        if(e.key.includes("Right")) keys['right'] = true;
        if(e.key.includes("Up")) keys['up'] = true;
        if(e.key.includes("Down")) keys['down'] = true;
    };
    window.onkeyup = (e) => {
        if(e.key.includes("Left")) keys['left'] = false;
        if(e.key.includes("Right")) keys['right'] = false;
        if(e.key.includes("Up")) keys['up'] = false;
        if(e.key.includes("Down")) keys['down'] = false;
    };
</script>
</body>
</html>
